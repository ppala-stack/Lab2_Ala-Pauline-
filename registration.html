<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration Form</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffc0cb,#ff9ecf);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    width:350px;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#ff69b4;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#ff1493;
}

</style>
</head>

<body>

<div class="container">

<h2>Registration Form</h2>

<form action="group_2_homepage.html">

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email" required>

<input type="password" placeholder="Password" required>

<label>Birthdate</label><br>
<input type="date" required>

<input type="number" placeholder="Age" required>

<br>

<button type="submit">Continue</button>

</form>

</div>

</body>
</html>
